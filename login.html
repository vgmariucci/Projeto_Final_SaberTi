<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar Conta - Orc Studio</title>
    <link rel="stylesheet" href="css/login_style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="particles-js"></div>

    <div class="login-container">
        <h2>Acessar Orc Studio</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
                <label for="password">Senha *</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <div class="button-group">
                <button type="submit" id="btnSubmit" class="btn-submit">Entrar</button>
                <button type="button" id="btnCancel" class="btn-cancel">Limpar</button>
                <button type="button" id="btnForgot" class="btn-forgot">Esqueci minha senha</button>
            </div>
        </form>
    </div>

    <script type="module" src="js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
