<header class="view-header">
    <h2>Controle de Usuários do Sistema</h2>
</header>
<div class="grid-layout">
    <div class="card">
        <h3>Provisionar Novo Usuário</h3>
        <form id="form-usuario">
            <div class="form-group">
                <label>Nome do Colaborador</label>
                <input type="text" id="user-nome" placeholder="Nome Completo" required>
            </div>
            <div class="form-group">
                <label>E-mail Corporativo</label>
                <input type="email" id="user-email" placeholder="nome@empresa.com" required>
            </div>
            <div class="form-group">
                <label>Senha Temporária</label>
                <input type="text" id="user-senha" placeholder="Ex: Mudar@123" required>
                <small style="color: var(--text-muted); font-size:11px;">Informe esta senha ao colaborador para o
                    primeiro acesso.</small>
            </div>
            <button type="submit" class="btn btn-success">Registrar Usuário</button>
        </form>
    </div>
    <div class="card">
        <h3>Usuários Ativos</h3>

        <div class="form-group" style="margin-bottom: 15px;">
            <input type="text" id="search-usuario" placeholder="🔍 Buscar por ID, Nome ou E-mail..."
                style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Data Cadastro</th>
                    </tr>
                </thead>
                <tbody id="table-usuarios-body"></tbody>
            </table>
        </div>
    </div>
</div>
